<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Direction 3 Modern Confident">
  <defs>
    <linearGradient id="d3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1018"/><stop offset="1" stop-color="#101722"/>
    </linearGradient>
    <linearGradient id="d3img" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13202A"/><stop offset="1" stop-color="#1A2A33"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#d3bg)"/>
  <!-- header -->
  <text x="40" y="46" font-family="'Trebuchet MS', Arial, sans-serif" font-size="21" font-weight="700" fill="#EAF0F4">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
  <g font-family="Arial, sans-serif" font-size="12.5" fill="rgba(234,240,244,0.66)">
    <text x="430" y="44">Comprar</text><text x="510" y="44">Arrendar</text><text x="595" y="44">Vender</text><text x="675" y="44">Consultores</text>
  </g>
  <rect x="790" y="26" width="130" height="32" rx="7" fill="#C8A86B"/><text x="812" y="47" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#11130E">Falar com consultor</text>
  <line x1="40" y1="72" x2="920" y2="72" stroke="rgba(255,255,255,0.08)"/>
  <!-- left -->
  <rect x="40" y="104" width="200" height="26" rx="13" fill="rgba(63,185,132,0.12)" stroke="rgba(63,185,132,0.5)"/>
  <text x="56" y="121" font-family="Arial, sans-serif" font-size="11" fill="#5FD3A3">● Ranked fairly · every month</text>
  <text x="38" y="184" font-family="'Trebuchet MS', Arial, sans-serif" font-size="44" font-weight="700" fill="#EAF0F4">The best agents,</text>
  <text x="38" y="230" font-family="'Trebuchet MS', Arial, sans-serif" font-size="44" font-weight="700" fill="#EAF0F4">proven by <tspan fill="#C8A86B">data</tspan>.</text>
  <text x="40" y="268" font-family="Arial, sans-serif" font-size="14.5" fill="rgba(234,240,244,0.62)">Performance you can see — close rate, response time, real reviews.</text>
  <rect x="40" y="290" width="186" height="46" rx="8" fill="#C8A86B"/><text x="66" y="318" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#11130E">Find a consultant</text>
  <rect x="238" y="290" width="150" height="46" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)"/><text x="262" y="318" font-family="Arial, sans-serif" font-size="14" fill="#D7DEE4">Browse homes</text>
  <rect x="40" y="354" width="448" height="48" rx="8" fill="#13202A" stroke="rgba(255,255,255,0.1)"/>
  <text x="58" y="383" font-family="Arial, sans-serif" font-size="13" fill="rgba(234,240,244,0.55)">Cidade ▾        Comprar / Arrendar ▾</text>
  <rect x="392" y="362" width="84" height="32" rx="6" fill="#C8A86B"/><text x="410" y="383" font-family="Arial, sans-serif" font-size="12.5" font-weight="700" fill="#11130E">Procurar</text>
  <!-- stat chips -->
  <g font-family="Arial, sans-serif">
    <text x="40" y="442" font-size="20" font-weight="700" fill="#EAF0F4">120+</text><text x="40" y="460" font-size="10.5" fill="rgba(234,240,244,0.5)">consultants</text>
    <text x="150" y="442" font-size="20" font-weight="700" fill="#EAF0F4">90d</text><text x="150" y="460" font-size="10.5" fill="rgba(234,240,244,0.5)">rolling window</text>
    <text x="280" y="442" font-size="20" font-weight="700" fill="#EAF0F4">monthly</text><text x="280" y="460" font-size="10.5" fill="rgba(234,240,244,0.5)">refresh</text>
  </g>
  <!-- right media -->
  <rect x="528" y="100" width="392" height="392" rx="12" fill="url(#d3img)" stroke="rgba(255,255,255,0.08)"/>
  <text x="724" y="250" font-family="Arial, sans-serif" font-size="12" fill="rgba(234,240,244,0.3)" text-anchor="middle">image / contained video</text>
  <!-- proof card (data-forward) -->
  <rect x="556" y="360" width="336" height="108" rx="10" fill="rgba(12,16,24,0.85)" stroke="rgba(255,255,255,0.12)"/>
  <text x="574" y="384" font-family="Arial, sans-serif" font-size="10" letter-spacing="1.5" fill="#5FD3A3">▲ #1 THIS MONTH · LISBOA</text>
  <circle cx="592" cy="420" r="18" fill="#1A2A33"/>
  <text x="622" y="416" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#EAF0F4">Ana Silva</text>
  <text x="622" y="434" font-family="Arial, sans-serif" font-size="10.5" fill="rgba(234,240,244,0.55)">close 86% · resp 1.2h · 142 deals</text>
  <rect x="574" y="446" width="64" height="15" rx="7" fill="rgba(63,185,132,0.16)" stroke="#3FB984"/><text x="582" y="457" font-family="Arial, sans-serif" font-size="9" fill="#5FD3A3">✓ Verified</text>
  <text x="838" y="457" font-family="Arial, sans-serif" font-size="11" fill="#C8A86B">→ perfil</text>
  <!-- label -->
  <text x="40" y="516" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#C8A86B">DIRECTION 3 — MODERN CONFIDENT</text>
  <text x="330" y="516" font-family="Arial, sans-serif" font-size="11" fill="rgba(234,240,244,0.5)">contemporary marketplace · all-sans · data-forward · verified-green accent</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1020" font-family="Arial, sans-serif" role="img" aria-label="Consultant discovery wireframe">
  <style>
    .band{fill:#F3F4F6;stroke:#C7CBD1}.box{fill:#E4E7EB;stroke:#B6BBC2}.img{fill:#DDE0E5;stroke:#B6BBC2}
    .btn{fill:#fff;stroke:#8C9099}.lbl{fill:#5B616B;font-size:13px}.tag{fill:#9AA0A8;font-size:11px}
    .line{fill:#CBD0D6}.hd{fill:#6B7280;font-size:12px;letter-spacing:1px}.badge{fill:#D6DAE0;stroke:#B6BBC2}
  </style>
  <rect width="960" height="1020" fill="#fff"/>
  <rect class="band" x="0" y="0" width="960" height="56"/><rect class="box" x="24" y="18" width="90" height="20"/><text class="lbl" x="30" y="33">logo</text>
  <rect class="box" x="760" y="16" width="40" height="24"/><rect class="btn" x="812" y="14" width="124" height="28" rx="14"/><text class="lbl" x="828" y="32">Falar c/ consultor</text>
  <!-- intro -->
  <text class="hd" x="24" y="86">INTRO</text><rect class="band" x="24" y="96" width="912" height="60"/>
  <rect class="line" x="48" y="116" width="300" height="14"/><text class="tag" x="760" y="130">how scoring works →</text>
  <!-- filter + view toggle -->
  <text class="hd" x="24" y="184">FILTER BAR  ‖  VIEW TOGGLE</text><rect class="band" x="24" y="194" width="912" height="48"/>
  <rect class="box" x="48" y="206" width="110" height="24"/><text class="tag" x="60" y="222">city ▾</text>
  <rect class="box" x="170" y="206" width="150" height="24"/><text class="tag" x="182" y="222">specialization ▾</text>
  <rect class="box" x="332" y="206" width="120" height="24"/><text class="tag" x="344" y="222">language ▾</text>
  <rect class="box" x="700" y="206" width="100" height="24"/><text class="tag" x="712" y="222">● Ranked</text>
  <rect class="box" x="808" y="206" width="100" height="24"/><text class="tag" x="838" y="222">All</text>
  <!-- rising talent -->
  <text class="hd" x="24" y="276">RISING TALENT — new &amp; climbing</text><rect class="band" x="24" y="286" width="912" height="150"/>
  <g>
    <rect class="box" x="48" y="306" width="280" height="110"/><circle class="img" cx="78" cy="336" r="18"/><rect class="line" x="108" y="326" width="120" height="10"/><rect class="badge" x="108" y="344" width="90" height="16" rx="8"/><text class="tag" x="116" y="356">Rising Talent</text><rect class="line" x="60" y="384" width="200" height="8"/>
    <rect class="box" x="340" y="306" width="280" height="110"/><circle class="img" cx="370" cy="336" r="18"/><rect class="line" x="400" y="326" width="120" height="10"/><rect class="badge" x="400" y="344" width="90" height="16" rx="8"/><text class="tag" x="408" y="356">Rising Talent</text><rect class="line" x="352" y="384" width="200" height="8"/>
    <rect class="box" x="632" y="306" width="280" height="110"/><circle class="img" cx="662" cy="336" r="18"/><rect class="line" x="692" y="326" width="120" height="10"/><rect class="badge" x="692" y="344" width="90" height="16" rx="8"/><text class="tag" x="700" y="356">Rising Talent</text><rect class="line" x="644" y="384" width="200" height="8"/>
  </g>
  <!-- results grid -->
  <text class="hd" x="24" y="470">RESULTS — ConsultantCards (rank # in Ranked view)</text>
  <rect class="btn" x="740" y="456" width="172" height="24" rx="12"/><text class="tag" x="756" y="472">Suggest one for me</text>
  <g>
    <!-- card template repeated -->
    <g>
      <rect class="box" x="24" y="486" width="290" height="150"/><text class="tag" x="36" y="506">#1</text><circle class="img" cx="64" cy="536" r="22"/>
      <rect class="line" x="98" y="518" width="120" height="11"/><rect class="badge" x="98" y="536" width="70" height="16" rx="8"/><text class="tag" x="106" y="548">Verified</text>
      <rect class="line" x="40" y="576" width="240" height="8"/><text class="tag" x="40" y="604">close rate · response · specialization · city</text>
    </g>
    <g transform="translate(311,0)">
      <rect class="box" x="24" y="486" width="290" height="150"/><text class="tag" x="36" y="506">#2</text><circle class="img" cx="64" cy="536" r="22"/>
      <rect class="line" x="98" y="518" width="120" height="11"/><rect class="badge" x="98" y="536" width="70" height="16" rx="8"/><text class="tag" x="106" y="548">Verified</text>
      <rect class="line" x="40" y="576" width="240" height="8"/><text class="tag" x="40" y="604">close rate · response · specialization · city</text>
    </g>
    <g transform="translate(622,0)">
      <rect class="box" x="24" y="486" width="290" height="150"/><text class="tag" x="36" y="506">#3</text><circle class="img" cx="64" cy="536" r="22"/>
      <rect class="line" x="98" y="518" width="120" height="11"/><rect class="badge" x="98" y="536" width="70" height="16" rx="8"/><text class="tag" x="106" y="548">Verified</text>
      <rect class="line" x="40" y="576" width="240" height="8"/><text class="tag" x="40" y="604">close rate · response · specialization · city</text>
    </g>
  </g>
  <g transform="translate(0,162)">
    <rect class="box" x="24" y="486" width="290" height="150"/><rect class="box" x="335" y="486" width="290" height="150"/><rect class="box" x="646" y="486" width="290" height="150"/>
    <text class="tag" x="150" y="566">card</text><text class="tag" x="461" y="566">card</text><text class="tag" x="772" y="566">card</text>
  </g>
  <rect class="band" x="0" y="988" width="960" height="32"/><text class="tag" x="40" y="1008">FOOTER</text>
</svg>

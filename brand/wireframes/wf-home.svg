  <g>
    <rect class="box" x="56" y="558" width="200" height="130"/><circle class="img" cx="86" cy="588" r="18"/><rect class="line" x="116" y="578" width="100" height="10"/><rect class="line" x="116" y="596" width="70" height="8"/><rect class="line" x="72" y="630" width="160" height="8"/><rect class="line" x="72" y="650" width="120" height="8"/>
    <rect class="box" x="276" y="558" width="200" height="130"/><circle class="img" cx="306" cy="588" r="18"/><rect class="line" x="336" y="578" width="100" height="10"/><rect class="line" x="336" y="596" width="70" height="8"/><rect class="line" x="292" y="630" width="160" height="8"/><rect class="line" x="292" y="650" width="120" height="8"/>
    <rect class="box" x="496" y="558" width="200" height="130"/><circle class="img" cx="526" cy="588" r="18"/><rect class="line" x="556" y="578" width="100" height="10"/><rect class="line" x="556" y="596" width="70" height="8"/><rect class="line" x="512" y="630" width="160" height="8"/><rect class="line" x="512" y="650" width="120" height="8"/>
    <rect class="box" x="716" y="558" width="188" height="130"/><circle class="img" cx="746" cy="588" r="18"/><rect class="line" x="776" y="578" width="90" height="10"/><rect class="line" x="776" y="596" width="60" height="8"/><rect class="line" x="732" y="630" width="150" height="8"/><rect class="line" x="732" y="650" width="110" height="8"/>
  </g>

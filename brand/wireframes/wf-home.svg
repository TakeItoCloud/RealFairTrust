  <text class="hd" x="24" y="744">FEATURED HOMES</text>
  <rect class="band" x="24" y="754" width="912" height="180"/>
  <g>
    <rect class="box" x="56" y="774" width="270" height="140"/><rect class="img" x="56" y="774" width="270" height="86"/><text class="tag" x="170" y="822">img</text><rect class="line" x="68" y="872" width="120" height="10"/><rect class="line" x="68" y="892" width="180" height="8"/>
    <rect class="box" x="346" y="774" width="270" height="140"/><rect class="img" x="346" y="774" width="270" height="86"/><text class="tag" x="460" y="822">img</text><rect class="line" x="358" y="872" width="120" height="10"/><rect class="line" x="358" y="892" width="180" height="8"/>
    <rect class="box" x="636" y="774" width="268" height="140"/><rect class="img" x="636" y="774" width="268" height="86"/><text class="tag" x="750" y="822">img</text><rect class="line" x="648" y="872" width="120" height="10"/><rect class="line" x="648" y="892" width="180" height="8"/>
  </g>
  <!-- split -->
  <text class="hd" x="24" y="970">FOR CLIENTS  ‖  FOR CONSULTANTS</text>
  <rect class="band" x="24" y="980" width="444" height="96"/><text class="tag" x="200" y="1032">clients + CTA</text>
  <rect class="band" x="492" y="980" width="444" height="96"/><text class="tag" x="660" y="1032">consultants + CTA</text>
  <!-- trust + join -->
  <rect class="band" x="24" y="1092" width="912" height="40"/><text class="tag" x="40" y="1116">TRUST · how rating works → /como-funciona</text>
  <rect class="band" x="0" y="1148" width="960" height="32"/><text class="tag" x="40" y="1168">FOOTER · Explorar · Para consultores · Empresa · Legal</text>

  <rect class="btn" x="236" y="240" width="150" height="40" rx="6"/><text class="lbl" x="262" y="265">Browse homes</text>
  <rect class="box" x="56" y="294" width="500" height="30"/><text class="tag" x="66" y="313">search:  city ▾   type ▾   [ Search ]</text>
  <rect class="img" x="600" y="120" width="304" height="192"/><text class="tag" x="730" y="220">image</text>

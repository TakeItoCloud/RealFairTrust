<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1180" font-family="Arial, sans-serif" role="img" aria-label="Home wireframe">
  <style>
    .band{fill:#F3F4F6;stroke:#C7CBD1}
    .box{fill:#E4E7EB;stroke:#B6BBC2}
    .img{fill:#DDE0E5;stroke:#B6BBC2}
    .btn{fill:#fff;stroke:#8C9099}
    .lbl{fill:#5B616B;font-size:13px}
    .tag{fill:#9AA0A8;font-size:11px}
    .line{fill:#CBD0D6}
    .hd{fill:#6B7280;font-size:12px;letter-spacing:1px}
  </style>
  <rect width="960" height="1180" fill="#fff"/>
  <!-- header -->
  <rect class="band" x="0" y="0" width="960" height="56"/>
  <rect class="box" x="24" y="18" width="90" height="20"/><text class="lbl" x="30" y="33">logo</text>
  <rect class="line" x="360" y="24" width="60" height="8"/><rect class="line" x="430" y="24" width="60" height="8"/><rect class="line" x="500" y="24" width="70" height="8"/><rect class="line" x="580" y="24" width="80" height="8"/>
  <rect class="box" x="760" y="16" width="40" height="24"/><text class="tag" x="768" y="32">PT/EN</text>
  <rect class="btn" x="812" y="14" width="124" height="28" rx="14"/><text class="lbl" x="828" y="32">Falar c/ consultor</text>

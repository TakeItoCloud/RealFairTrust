<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="Arial, sans-serif" role="img" aria-label="Agent performance dashboard wireframe">
  <style>
    .band{fill:#F3F4F6;stroke:#C7CBD1}.box{fill:#E4E7EB;stroke:#B6BBC2}.nav{fill:#ECEEF1;stroke:#C7CBD1}
    .btn{fill:#fff;stroke:#8C9099}.lbl{fill:#5B616B;font-size:13px}.tag{fill:#9AA0A8;font-size:11px}
    .line{fill:#CBD0D6}.hd{fill:#6B7280;font-size:12px;letter-spacing:1px}.badge{fill:#D6DAE0;stroke:#B6BBC2}
    .bar{fill:#C2C7CE}.bart{fill:#E4E7EB;stroke:#B6BBC2}
  </style>
  <rect width="960" height="760" fill="#fff"/>
  <!-- top bar -->
  <rect class="band" x="0" y="0" width="960" height="48"/><rect class="box" x="24" y="14" width="80" height="20"/><text class="lbl" x="30" y="29">logo</text>
  <text class="tag" x="820" y="29">agent ▾ · sign out</text>
  <!-- side nav -->
  <rect class="nav" x="0" y="48" width="200" height="712"/>
  <text class="tag" x="24" y="84">Overview</text><text class="tag" x="24" y="116">Profile</text><text class="tag" x="24" y="148">My listings</text><text class="tag" x="24" y="180">Leads</text>
  <rect class="box" x="12" y="196" width="176" height="28"/><text class="lbl" x="24" y="215">My performance</text>
  <!-- content -->
  <text class="hd" x="224" y="84">MY PERFORMANCE — score as coaching</text>
  <!-- composite + rank tiles -->
  <rect class="box" x="224" y="100" width="220" height="90"/><text class="tag" x="240" y="124">Current composite</text><rect class="line" x="240" y="140" width="120" height="20"/><text class="tag" x="240" y="180">this month (90-day window)</text>
  <rect class="box" x="460" y="100" width="220" height="90"/><text class="tag" x="476" y="124">Rank in city</text><rect class="line" x="476" y="140" width="80" height="20"/><text class="tag" x="476" y="180">Lisboa · residential</text>
  <rect class="box" x="696" y="100" width="240" height="90"/><text class="tag" x="712" y="124">Trend vs last month</text><rect class="line" x="712" y="140" width="160" height="20"/>
  <!-- sub-signals vs target -->
  <text class="hd" x="224" y="224">SUB-SIGNALS vs TARGET</text><rect class="band" x="224" y="234" width="712" height="220"/>
  <g>
    <text class="tag" x="248" y="270">satisfaction (35%)</text><rect class="bart" x="430" y="258" width="460" height="16"/><rect class="bar" x="430" y="258" width="380" height="16"/>
    <text class="tag" x="248" y="304">close rate (25%)</text><rect class="bart" x="430" y="292" width="460" height="16"/><rect class="bar" x="430" y="292" width="300" height="16"/>
    <text class="tag" x="248" y="338">responsiveness (15%)</text><rect class="bart" x="430" y="326" width="460" height="16"/><rect class="bar" x="430" y="326" width="250" height="16"/>
    <text class="tag" x="248" y="372">conversion (15%)</text><rect class="bart" x="430" y="360" width="460" height="16"/><rect class="bar" x="430" y="360" width="330" height="16"/>
    <text class="tag" x="248" y="406">activity sufficiency (10%)</text><rect class="bart" x="430" y="394" width="460" height="16"/><rect class="bar" x="430" y="394" width="410" height="16"/>
    <text class="tag" x="248" y="440">bars = current vs. target band</text>
  </g>
  <!-- what to improve -->
  <text class="hd" x="224" y="488">WHAT TO IMPROVE (tips)</text><rect class="band" x="224" y="498" width="712" height="120"/>
  <rect class="line" x="248" y="524" width="640" height="8"/><rect class="line" x="248" y="548" width="600" height="8"/><rect class="line" x="248" y="572" width="560" height="8"/>
  <text class="tag" x="248" y="606">→ resources / coaching links</text>
  <!-- methodology link -->
  <rect class="band" x="224" y="634" width="712" height="40"/><text class="tag" x="248" y="659">→ how scoring works · why the window resets monthly</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="Arial, sans-serif" role="img" aria-label="Recommended hero wireframe">
  <style>
    .band{fill:#F3F4F6;stroke:#C7CBD1}.box{fill:#E4E7EB;stroke:#B6BBC2}.img{fill:#DDE0E5;stroke:#B6BBC2}
    .btn{fill:#fff;stroke:#8C9099}.lbl{fill:#5B616B;font-size:13px}.tag{fill:#9AA0A8;font-size:11px}
    .line{fill:#CBD0D6}.hd{fill:#6B7280;font-size:12px;letter-spacing:1px}.badge{fill:#D6DAE0;stroke:#B6BBC2}
    .eye{fill:#9AA0A8;font-size:10px;letter-spacing:2px}
  </style>
  <rect width="960" height="470" fill="#fff"/>
  <rect class="band" x="0" y="0" width="960" height="52"/><rect class="box" x="24" y="16" width="86" height="20"/><text class="lbl" x="30" y="31">logo</text>
  <rect class="btn" x="812" y="12" width="124" height="28" rx="14"/><text class="lbl" x="828" y="30">Falar c/ consultor</text>
  <text class="hd" x="24" y="78">RECOMMENDED HERO — split: value+search left, contained media+proof right</text>

  <!-- LEFT column -->
  <rect class="band" x="24" y="92" width="520" height="350"/>
  <text class="eye" x="48" y="128">MERIT-BASED REAL ESTATE</text>
  <rect class="line" x="48" y="142" width="430" height="22"/><rect class="line" x="48" y="174" width="360" height="22"/>
  <text class="tag" x="48" y="166"> </text>
  <rect class="line" x="48" y="214" width="420" height="9"/>
  <text class="tag" x="48" y="212">subcopy: ranked fairly, every month</text>
  <rect class="btn" x="48" y="240" width="190" height="42" rx="6"/><text class="lbl" x="72" y="266">Find a consultant</text>
  <rect class="btn" x="248" y="240" width="150" height="42" rx="6"/><text class="lbl" x="276" y="266">Browse homes</text>
  <rect class="box" x="48" y="300" width="448" height="48"/><text class="tag" x="66" y="329">search:  city ▾    buy / rent ▾    [ Search ]</text>
  <text class="tag" x="48" y="384">trust strip: "120+ verified consultants · scored monthly"</text>
  <rect class="badge" x="48" y="396" width="180" height="18" rx="9"/><text class="tag" x="60" y="409">★ proof / transparency note</text>

  <!-- RIGHT media panel -->
  <rect class="img" x="560" y="92" width="376" height="350"/>
  <text class="tag" x="690" y="250">poster image (loads first)</text>
  <text class="tag" x="640" y="272">+ optional muted looping video on idle</text>
  <text class="tag" x="660" y="292">(off under reduced-motion)</text>
  <!-- proof card overlay -->
  <rect class="box" x="600" y="330" width="296" height="90" fill="#EEF0F3"/>
  <text class="tag" x="616" y="352">TOP THIS MONTH · Lisboa</text>
  <circle class="img" cx="636" cy="386" r="18"/><rect class="line" x="666" y="372" width="120" height="10"/>
  <rect class="badge" x="666" y="390" width="70" height="15" rx="7"/><text class="tag" x="674" y="402">Verified</text>
  <text class="tag" x="800" y="402">→ profile</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-label="RealFairTrust logo concepts comparison">
  <rect width="1200" height="860" fill="#0B0C12"/>
  <text x="60" y="64" font-family="Georgia, serif" font-size="30" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust — Logo Directions</text>
  <text x="60" y="92" font-family="Arial, sans-serif" font-size="14" letter-spacing="2" fill="rgba(245,245,247,0.5)">FOUR CONCEPTS · GOLD-ON-DARK LUXURY SYSTEM · PICK ONE TO REFINE</text>

  <!-- Card A -->
  <g transform="translate(60,130)">
    <rect width="510" height="320" rx="16" fill="#12141D" stroke="rgba(200,168,107,0.25)"/>
    <text x="28" y="44" font-family="Arial, sans-serif" font-size="13" letter-spacing="3" fill="#C8A86B">CONCEPT A — EQUILIBRIUM</text>
    <g transform="translate(150,80)" fill="none" stroke="#C8A86B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="20" y1="50" x2="170" y2="50"/>
      <line x1="95" y1="50" x2="95" y2="120"/>
      <path d="M70 145 L95 115 L120 145 Z" fill="#C8A86B" stroke="none"/>
      <path d="M20 50 L20 72 M2 96 L20 78 L38 96"/>
      <path d="M170 50 L170 72 M152 96 L170 78 L188 96"/>
    </g>
    <text x="28" y="240" font-family="Georgia, serif" font-size="30" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="28" y="280" font-family="Arial, sans-serif" font-size="14" fill="rgba(245,245,247,0.62)">Balance beam weighing two homes — fairness made literal.</text>
    <text x="28" y="302" font-family="Arial, sans-serif" font-size="13" fill="rgba(245,245,247,0.42)">Best if the core message is impartial, even-handed judging.</text>
  </g>

  <!-- Card B -->
  <g transform="translate(630,130)">
    <rect width="510" height="320" rx="16" fill="#12141D" stroke="rgba(200,168,107,0.25)"/>
    <text x="28" y="44" font-family="Arial, sans-serif" font-size="13" letter-spacing="3" fill="#C8A86B">CONCEPT B — TRUST SEAL</text>
    <g transform="translate(150,135)">
      <circle r="60" fill="none" stroke="#C8A86B" stroke-width="3.5"/>
      <circle r="49" fill="none" stroke="rgba(200,168,107,0.35)" stroke-width="1.5"/>
      <text x="0" y="2" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#C8A86B">RFT</text>
      <path d="M-14 22 l9 9 l18 -20" fill="none" stroke="#22C55E" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="28" y="240" font-family="Georgia, serif" font-size="30" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="28" y="280" font-family="Arial, sans-serif" font-size="14" fill="rgba(245,245,247,0.62)">Monogram seal with a verification check — authority + trust.</text>
    <text x="28" y="302" font-family="Arial, sans-serif" font-size="13" fill="rgba(245,245,247,0.42)">Best for a credential / "verified network" feel. Scales to favicon.</text>
  </g>

  <!-- Card C -->
  <g transform="translate(60,478)">
    <rect width="510" height="320" rx="16" fill="#12141D" stroke="rgba(200,168,107,0.25)"/>
    <text x="28" y="44" font-family="Arial, sans-serif" font-size="13" letter-spacing="3" fill="#C8A86B">CONCEPT C — VERIFIED ROOFLINE</text>
    <g transform="translate(150,90)" fill="none" stroke="#C8A86B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 66 L60 9 L120 66"/>
      <path d="M50 78 l18 18 l40 -52" stroke="#D6B87A" stroke-width="6"/>
    </g>
    <text x="28" y="240" font-family="Georgia, serif" font-size="30" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="28" y="280" font-family="Arial, sans-serif" font-size="14" fill="rgba(245,245,247,0.62)">A rooftop whose slope becomes a checkmark — modern, minimal.</text>
    <text x="28" y="302" font-family="Arial, sans-serif" font-size="13" fill="rgba(245,245,247,0.42)">Best for a clean, tech-forward, scalable mark. My lean.</text>
  </g>

  <!-- Card D -->
  <g transform="translate(630,478)">
    <rect width="510" height="320" rx="16" fill="#12141D" stroke="rgba(200,168,107,0.25)"/>
    <text x="28" y="44" font-family="Arial, sans-serif" font-size="13" letter-spacing="3" fill="#C8A86B">CONCEPT D — FAIR ROOFTOPS</text>
    <g transform="translate(150,80)" fill="none" stroke="#C8A86B" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="75" y1="8" x2="75" y2="128"/>
      <line x1="9" y1="32" x2="141" y2="32"/>
      <path d="M-9 75 L9 45 L27 75"/>
      <line x1="9" y1="32" x2="9" y2="45"/>
      <path d="M123 75 L141 45 L159 75"/>
      <line x1="141" y1="32" x2="141" y2="45"/>
      <path d="M54 136 L75 118 L96 136"/>
    </g>
    <text x="28" y="240" font-family="Georgia, serif" font-size="30" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="28" y="280" font-family="Arial, sans-serif" font-size="14" fill="rgba(245,245,247,0.62)">Two rooftops hung from one beam — scales built out of houses.</text>
    <text x="28" y="302" font-family="Arial, sans-serif" font-size="13" fill="rgba(245,245,247,0.42)">Best if you want "fair" + "real estate" fused into one symbol.</text>
  </g>

  <text x="60" y="838" font-family="Arial, sans-serif" font-size="13" fill="rgba(245,245,247,0.4)">Palette: gold #C8A86B / #D6B87A · ink #0E0F16 / #12141D · cream #F5F1EA · verified-green #22C55E · Display serif + sans support text.</text>
</svg>

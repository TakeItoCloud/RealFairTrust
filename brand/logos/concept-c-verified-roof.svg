<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="RealFairTrust - Verified Roofline concept">
  <rect width="480" height="200" fill="#0E0F16"/>
  <g transform="translate(70,70)" fill="none" stroke="#C8A86B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- roofline chevron -->
    <path d="M0 44 L40 6 L80 44"/>
    <!-- integrated check forming the right slope tail -->
    <path d="M34 52 l12 12 l26 -34" stroke="#D6B87A" stroke-width="5"/>
  </g>
  <g transform="translate(190,112)" font-family="Georgia, 'Times New Roman', serif">
    <text x="0" y="0" font-size="34" letter-spacing="0.5" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="2" y="26" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3" fill="rgba(245,245,247,0.6)">PERFORMANCE YOU CAN SEE</text>
  </g>
</svg>

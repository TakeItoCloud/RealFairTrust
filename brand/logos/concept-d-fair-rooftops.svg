<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="RealFairTrust - Fair Rooftops concept">
  <rect width="480" height="200" fill="#0E0F16"/>
  <g transform="translate(60,58)" fill="none" stroke="#C8A86B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- two mirrored rooftops sharing a central beam = scales -->
    <line x1="50" y1="6" x2="50" y2="86"/>
    <line x1="6" y1="22" x2="94" y2="22"/>
    <!-- left roof pan -->
    <path d="M-6 50 L6 30 L18 50"/>
    <line x1="6" y1="22" x2="6" y2="30"/>
    <!-- right roof pan -->
    <path d="M82 50 L94 30 L106 50"/>
    <line x1="94" y1="22" x2="94" y2="30"/>
    <!-- base -->
    <path d="M36 92 L50 80 L64 92"/>
  </g>
  <g transform="translate(195,112)" font-family="Georgia, 'Times New Roman', serif">
    <text x="0" y="0" font-size="34" letter-spacing="0.5" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="2" y="26" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3" fill="rgba(245,245,247,0.6)">FAIR BY DESIGN</text>
  </g>
</svg>

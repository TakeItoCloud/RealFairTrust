<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="RealFairTrust - Trust Seal concept">
  <rect width="480" height="200" fill="#0E0F16"/>
  <g transform="translate(100,100)">
    <circle r="56" fill="none" stroke="#C8A86B" stroke-width="3"/>
    <circle r="46" fill="none" stroke="rgba(200,168,107,0.35)" stroke-width="1.5"/>
    <text x="0" y="9" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#C8A86B">RFT</text>
    <!-- verification check -->
    <path d="M-12 26 l8 8 l16 -18" fill="none" stroke="#22C55E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,4)"/>
  </g>
  <g transform="translate(190,112)" font-family="Georgia, 'Times New Roman', serif">
    <text x="0" y="0" font-size="34" letter-spacing="0.5" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="2" y="26" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3" fill="rgba(245,245,247,0.6)">VERIFIED CONSULTANTS</text>
  </g>
</svg>

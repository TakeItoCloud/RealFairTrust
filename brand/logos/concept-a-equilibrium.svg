<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" role="img" aria-label="RealFairTrust - Equilibrium concept">
  <rect width="480" height="200" fill="#0E0F16"/>
  <g transform="translate(60,40)" fill="none" stroke="#C8A86B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- balance beam -->
    <line x1="10" y1="36" x2="110" y2="36"/>
    <!-- center post + fulcrum -->
    <line x1="60" y1="36" x2="60" y2="92"/>
    <path d="M40 110 L60 86 L80 110 Z" fill="#C8A86B" stroke="none"/>
    <!-- left pan: roof/house -->
    <path d="M10 36 L10 52 M-2 70 L10 56 L22 70" />
    <!-- right pan: roof/house -->
    <path d="M110 36 L110 52 M98 70 L110 56 L122 70" />
  </g>
  <g transform="translate(210,118)" font-family="Georgia, 'Times New Roman', serif">
    <text x="0" y="0" font-size="34" letter-spacing="0.5" fill="#F5F1EA">Real<tspan fill="#C8A86B">Fair</tspan>Trust</text>
    <text x="2" y="26" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="3" fill="rgba(245,245,247,0.6)">MERIT-BASED REAL ESTATE</text>
  </g>
</svg>
